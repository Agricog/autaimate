    <!-- 11.9: FAQPage (Point 13) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "What does Autaimate build?",
          "acceptedAnswer": { "@type": "Answer", "text": "Autaimate builds niche SaaS products for UK small businesses — each one solving a specific problem within a specific industry. The portfolio includes eighteen live products covering construction, trades, property, care, hospitality, inspection and close protection. New niche products are also commissioned fixed-price." } },
        { "@type": "Question", "name": "Who are Autaimate's products for?",
          "acceptedAnswer": { "@type": "Answer", "text": "UK small and medium businesses in construction, trades, property, lettings, care homes, hospitality, playground inspection, close protection and other regulated or underserved industries. Every product is built for one specific audience — not a generic business customer." } },
        { "@type": "Question", "name": "How is Autaimate different from generic SaaS platforms?",
          "acceptedAnswer": { "@type": "Answer", "text": "Generic SaaS flattens every industry into the same workflows. Autaimate builds each product around one specific industry — its regulations, its language, its pricing reality. A BS 7671 calculator built for UK electricians is not the same as a US electrical app with a Celsius toggle, and small UK businesses know the difference." } },
        { "@type": "Question", "name": "What does it cost to commission a new niche product?",
          "acceptedAnswer": { "@type": "Answer", "text": "Fixed-price, scoped per commission. Pricing is set before the build starts and doesn't change on the fly — no time-and-materials meter running. Most commissions are delivered for a fraction of what enterprise software houses charge for equivalent work." } },
        { "@type": "Question", "name": "How long does it take to build a new niche product?",
          "acceptedAnswer": { "@type": "Answer", "text": "Typically four weeks from kick-off to live product. Some commissions are shorter, some larger scopes take longer — but four weeks is the rhythm we design to. Faster than enterprise consulting projects and slower than throwaway no-code builds, by design." } },
        { "@type": "Question", "name": "Do I own the code if I commission a product?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. When a commissioned product ships, the client owns the code and the product. No licence we can revoke. No platform dependency that locks you in. You decide what happens to it next — keep it private, share it with peers, or expand it into its own SaaS venture." } },
        { "@type": "Question", "name": "Can a commissioned product be sold to others in my industry later?",
          "acceptedAnswer": { "@type": "Answer", "text": "That is the Autaimate model, actually — every product in the portfolio started as one customer's commission and then served the wider industry. If the commissioning client wants to keep it exclusive, we honour that. If they want it productised for the industry, we help with that too." } },
        { "@type": "Question", "name": "What technology stack does Autaimate use?",
          "acceptedAnswer": { "@type": "Answer", "text": "React 18 with TypeScript and Tailwind CSS on the frontend. Hono on Node.js or Cloudflare Workers for APIs. Neon PostgreSQL with Row-Level Security and pgcrypto encryption for data. Clerk for authentication, Stripe for payments, Resend for email, Cloudflare R2 for files, Railway for hosting. Modern, secure, UK-compliant from day one." } },
        { "@type": "Question", "name": "Is Autaimate GDPR compliant?",
          "acceptedAnswer": { "@type": "Answer", "text": "GDPR compliance is built into every product from the first commit — not bolted on later. Encryption at rest for Article 9 special-category data, audit logs on every state-changing operation, uniform responses on delete endpoints to prevent enumeration, and a documented security posture for each build." } },
        { "@type": "Question", "name": "Where are Autaimate products hosted?",
          "acceptedAnswer": { "@type": "Answer", "text": "Primarily on Railway with Cloudflare CDN in front. Data sits in Neon (EU region available) or at the edge via Cloudflare Workers when latency matters. UK data residency available on request for commissions that require it — particularly for care, legal and regulated sectors." } },
        { "@type": "Question", "name": "How do I buy access to an existing Autaimate product?",
          "acceptedAnswer": { "@type": "Answer", "text": "Each product has its own purchase route — some are one-off per-report payments (DetailRecon at £29.99), some are monthly subscriptions (SafeEat at £29.99 a month, TradGo at £59 a month), some are entirely free (TradeCalcs, HorseCost). Visit the individual product page for current pricing." } },
        { "@type": "Question", "name": "Does Autaimate work with US or international businesses?",
          "acceptedAnswer": { "@type": "Answer", "text": "Autaimate is UK-focused by design — every product is built around UK regulations, UK language and UK pricing norms. International businesses with UK operations or UK-serving SaaS plans are welcome to commission builds, but we do not localise for markets we do not know well. Our moat is specificity." } }
      ]
